<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TrustHandshake</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                color-scheme: dark;
            }

            * {
                box-sizing: border-box;
                margin: 0;
            }

            html,
            body {
                min-height: 100%;
            }

            body {
                font-family: "Inter", sans-serif;
                background: #000;
                color: #fff;
            }

            .site-header {
                position: fixed;
                top: 0;
                left: 0;
                z-index: 10;
                width: 100%;
                padding: 1.25rem 1.5rem;
                background: transparent;
            }

            .site-header__inner {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .site-header__brand {
                font-size: 0.875rem;
                font-weight: 800;
                color: #fff;
                font-variant: small-caps;
                letter-spacing: 0.04em;
            }

            .site-header__spacer {
                width: 1px;
                height: 1px;
            }

            .hero {
                position: relative;
                min-height: 100vh;
                overflow: hidden;
            }

            .hero__image,
            .hero__overlay {
                position: absolute;
                inset: 0;
            }

            .hero__image {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            .hero__overlay {
                background: rgba(0, 0, 0, 0.45);
            }

            .hero__content {
                position: relative;
                z-index: 1;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 5rem 1.5rem 3rem;
            }

            .hero__inner {
                width: min(100%, 72rem);
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }

            h1 {
                font-size: clamp(2.5rem, 8vw, 4rem);
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: -0.02em;
                line-height: 0.94;
                color: #fff;
                max-width: 10ch;
            }

            .hero__subheadline {
                margin-top: 1.5rem;
                font-size: clamp(1rem, 2vw, 1.4rem);
                font-weight: 400;
                line-height: 1.3;
                color: rgba(255, 255, 255, 0.7);
            }

            .hero__cta {
                margin-top: 2.5rem;
                padding: 1rem 2.5rem;
                border: 2px solid #111;
                border-radius: 999px;
                background: #fff;
                color: #111;
                font: inherit;
                font-size: 0.95rem;
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: -0.02em;
                cursor: pointer;
                box-shadow: 0 6px 0 rgba(0, 0, 0, 0.55);
                transform: translateY(0);
                transition:
                    background-color 150ms ease,
                    color 150ms ease,
                    transform 150ms ease,
                    box-shadow 150ms ease;
            }

            .hero__cta:hover,
            .hero__cta:focus-visible {
                background: #111;
                color: #fff;
                outline: none;
                transform: translateY(3px);
                box-shadow: 0 3px 0 rgba(0, 0, 0, 0.65);
            }

            @media (min-width: 768px) {
                .site-header {
                    padding: 1.5rem 2rem;
                }

                .hero__content {
                    padding: 6rem 2rem 4rem;
                }

                h1 {
                    font-size: clamp(4rem, 8vw, 9rem);
                }
            }
        </style>
    </head>
    <body>
        <header class="site-header" aria-label="Site header">
            <div class="site-header__inner">
                <div class="site-header__brand">NAI</div>
                <div class="site-header__spacer" aria-hidden="true"></div>
            </div>
        </header>
        <main>
            <section class="hero" aria-label="Hero">
                <img
                    class="hero__image"
                    src="./assets/mountains.jpg"
                    alt=""
                    aria-hidden="true"
                />
                <div class="hero__overlay" aria-hidden="true"></div>
                <div class="hero__content">
                    <div class="hero__inner">
                        <h1>The Anti Human is Coming</h1>
                        <p class="hero__subheadline">Differentiate NOW</p>
                        <button
                            class="hero__cta"
                            type="button"
                            onclick="
                                window.location.href =
                                    'mailto:lironktf@gmail.com'
                            "
                        >
                            Get in touch now, before it's too late
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
